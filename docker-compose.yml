services:
  app:
    build: .
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: db_inventory
      DB_USERNAME: root
      DB_PASSWORD: secret

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: db_inventory
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
